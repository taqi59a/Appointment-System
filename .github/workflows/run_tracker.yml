name: Belgium Visa Appointment Tracker

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

# Job ALWAYS passes (green). Notifications flow only via GitHub Issues.
permissions:
  contents: read
  issues: write

jobs:
  check-and-book:
    name: Check & Auto-Book Appointment
    runs-on: ubuntu-latest
    env:
      APP_ID: ${{ secrets.VOW_APP_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Random jitter (5-20 s)
        run: sleep $((RANDOM % 16 + 5))

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install playwright requests

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Restore browser session cache
        uses: actions/cache/restore@v4
        with:
          path: belgium-visa-tracker/vow_user_data
          key: vow-session-never-exact
          restore-keys: vow-session-

      - name: Run tracker
        id: tracker
        env:
          VOW_USERNAME: ${{ secrets.VOW_USERNAME }}
          VOW_PASSWORD: ${{ secrets.VOW_PASSWORD }}
          VOW_APP_ID: ${{ secrets.VOW_APP_ID }}
          CI: "true"
        working-directory: belgium-visa-tracker
        run: |
          python tracker.py 2>&1 | tee ../tracker_output.txt
          TRACKER_EXIT=${PIPESTATUS[0]}
          echo "exit_code=${TRACKER_EXIT}" >> "$GITHUB_OUTPUT"

      - name: Save browser session cache
        uses: actions/cache/save@v4
        with:
          path: belgium-visa-tracker/vow_user_data
          key: vow-session-${{ github.run_id }}

      # -----------------------------------------------------------------------
      # EXIT 1 — Slot booked successfully
      # -----------------------------------------------------------------------
      - name: Upload booking screenshot
        if: steps.tracker.outputs.exit_code == '1'
        uses: actions/upload-artifact@v4
        with:
          name: booking-confirmation-${{ github.run_id }}
          path: belgium-visa-tracker/booking_confirmation.png
          if-no-files-found: warn

      - name: Open issue - BOOKED
        if: steps.tracker.outputs.exit_code == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create "visa-booked" --color "0e8a16" \
            --description "Visa appointment booked" 2>/dev/null || true

          DETAILS=$(head -60 tracker_output.txt)
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')

          {
            echo "Appointment booked automatically for application: ${APP_ID}"
            echo ""
            echo "Booked at: ${NOW}"
            echo ""
            echo "Confirmation details:"
            echo "${DETAILS}"
            echo ""
            echo "Screenshot saved as workflow artifact: booking-confirmation-${{ github.run_id }}"
            echo ""
            echo "View appointment: https://visaonweb.diplomatie.be/en"
            echo "Workflow run: ${RUN_URL}"
          } > /tmp/issue_body.md

          gh issue create \
            --title "Visa Appointment BOOKED - ${APP_ID} - ${NOW}" \
            --label "visa-booked" \
            --body-file /tmp/issue_body.md

      # -----------------------------------------------------------------------
      # EXIT 3 — Slot found but auto-booking failed
      # -----------------------------------------------------------------------
      - name: Open issue - SLOT FOUND BOOKING FAILED
        if: steps.tracker.outputs.exit_code == '3'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create "urgent" --color "d73a4a" \
            --description "Requires immediate attention" 2>/dev/null || true

          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')

          {
            echo "URGENT: A slot opened for application ${APP_ID} but auto-booking could not complete."
            echo ""
            echo "Detected at: ${NOW}"
            echo ""
            echo "You must book manually right now - slots fill within minutes."
            echo ""
            echo "Book here: https://visaonweb.diplomatie.be/en"
            echo "Workflow logs: ${RUN_URL}"
          } > /tmp/issue_body.md

          gh issue create \
            --title "URGENT - Slot OPEN but booking failed - act now - ${NOW}" \
            --label "urgent" \
            --body-file /tmp/issue_body.md

      # -----------------------------------------------------------------------
      # EXIT 2 — Transient error (CAPTCHA / network) — silent, no issue
      # -----------------------------------------------------------------------
      - name: Log transient error silently
        if: steps.tracker.outputs.exit_code == '2'
        run: |
          echo "Transient error - will retry next scheduled run."
          cat tracker_output.txt || true

      # -----------------------------------------------------------------------
      # EXIT 0 — No slots available
      # -----------------------------------------------------------------------
      - name: Log clean run
        if: steps.tracker.outputs.exit_code == '0'
        run: echo "No slots available for ${APP_ID}."
