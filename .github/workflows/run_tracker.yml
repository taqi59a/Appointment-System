name: Belgium Visa Appointment Tracker

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-and-book:
    name: Check & Auto-Book Appointment
    runs-on: ubuntu-latest
    env:
      APP_ID: ${{ secrets.VOW_APP_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Random startup jitter (5–20 s)
        run: |
          JITTER=$((RANDOM % 16 + 5))
          echo "Jitter: sleeping ${JITTER}s before execution"
          sleep "$JITTER"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install playwright requests

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Run tracker
        id: tracker
        env:
          VOW_USERNAME: ${{ secrets.VOW_USERNAME }}
          VOW_PASSWORD: ${{ secrets.VOW_PASSWORD }}
          VOW_APP_ID: ${{ secrets.VOW_APP_ID }}
          CI: "true"
        working-directory: belgium-visa-tracker
        run: |
          set -o pipefail
          python tracker.py 2>&1 | tee ../tracker_output.txt
          TRACKER_EXIT=${PIPESTATUS[0]}
          echo "exit_code=${TRACKER_EXIT}" >> "$GITHUB_OUTPUT"
          exit 0  # never let this step itself fail — handled below

      - name: Upload confirmation screenshot
        if: steps.tracker.outputs.exit_code == '1'
        uses: actions/upload-artifact@v4
        with:
          name: booking-confirmation
          path: belgium-visa-tracker/booking_confirmation.png
          if-no-files-found: warn

      - name: Create GitHub Issue — appointment booked
        if: steps.tracker.outputs.exit_code == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DETAILS=$(head -50 tracker_output.txt)
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Ensure the "urgent" label exists
          gh label create "urgent" --color "d73a4a" \
            --description "Requires immediate attention" 2>/dev/null || true

          gh issue create \
            --title "✅ Visa Appointment BOOKED — $APP_ID" \
            --label "urgent" \
            --body "## Appointment booked automatically for \`$APP_ID\`

**Booked at:** $NOW

**Confirmation details:**
\`\`\`
$DETAILS
\`\`\`

Screenshot attached as workflow artifact \`booking-confirmation\`.

[➜ View appointment at visaonweb.diplomatie.be](https://visaonweb.diplomatie.be/en)

> Auto-generated by the appointment tracker workflow."

      - name: Fail job to trigger GitHub notification — booked
        if: steps.tracker.outputs.exit_code == '1'
        run: |
          echo "::error::Appointment BOOKED for $APP_ID — check the Issues tab and workflow artifacts!"
          exit 1

      - name: Create GitHub Issue — booking attempt failed
        if: steps.tracker.outputs.exit_code == '3'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')

          gh label create "urgent" --color "d73a4a" \
            --description "Requires immediate attention" 2>/dev/null || true

          gh issue create \
            --title "🚨 Slot Found but Booking FAILED — $APP_ID" \
            --label "urgent" \
            --body "## A slot was detected but could not be booked for \`$APP_ID\`

**Detected at:** $NOW

**Action required:** Log in manually and complete the booking immediately.

[➜ Book now at visaonweb.diplomatie.be](https://visaonweb.diplomatie.be/en)

> The tracker found an open slot but the auto-booking step failed (possible UI change or auth issue).
> Check the workflow logs for details."

      - name: Fail job to trigger GitHub notification — booking failed
        if: steps.tracker.outputs.exit_code == '3'
        run: |
          echo "::error::Slot detected for $APP_ID but auto-booking FAILED — manual action required!"
          exit 1

      - name: Warn on tracker error
        if: steps.tracker.outputs.exit_code == '2'
        run: |
          echo "::warning::Tracker encountered an error (CAPTCHA or login failure). Check logs."
          exit 1
